<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 단어</title>
    <meta property="og:title" content="오늘의 단어 맞추기" />
    <meta property="og:description" content="기회는 5번!" />
    <meta property="og:image" content="https://hwjangg.github.io/KoreanWordGame/og-image.png" />

        <a id="make-btn" href="share.html"

    <script src="game.js"></script>
