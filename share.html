<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 도전장 만들기</title>
    <meta property="og:title" content="단어 도전장 만들기" />
    <meta property="og:description" content="생성된 링크를 친구에게 공유해보세요!" />
    <meta property="og:image" content="https://hwjangg.github.io/KoreanWordGame/og-image-share.png?v=2" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg:     #121213;
            --card:   #1e1e20;
            --border: #3a3a3c;
            --text:   #fff;
            --gray:   #818384;
            --green:  #538d4e;
            --red:    #ff6b6b;
        }
        #creator {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 36px 16px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
        }
        #creator h1 { font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 6px; }
        #creator .subtitle { color: var(--gray); font-size: 0.78rem; margin-bottom: 28px; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 22px;
            width: 100%;
            max-width: 380px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        label { display: block; font-size: 0.78rem; color: var(--gray); margin-bottom: 6px; }
        input[type=text] {
            width: 100%;
            background: #2a2a3a;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
            padding: 10px 12px;
            outline: none;
            font-family: inherit;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--green); }
        .input-group { margin-bottom: 14px; }
        .jamo-hint { font-size: 0.78rem; margin-top: 5px; }
        .ok  { color: var(--green); }
        .err { color: var(--red); }
        button.primary {
            width: 100%;
            padding: 12px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: filter 0.15s;
            margin-top: 4px;
        }
        button.primary:hover:not(:disabled) { filter: brightness(1.15); }
        button.primary:disabled { background: var(--border); cursor: default; }
        #toast {
            position: fixed;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: #538d4e;
            color: #fff;
            padding: 6px 22px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #toast.show { opacity: 1; }
        button.copy {
            width: 100%;
            padding: 12px;
            background: #3a3a3c;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            margin-top: 10px;
        }
        .link-display {
            font-size: 0.78rem;
            color: var(--gray);
            word-break: break-all;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- 만들기 모드 -->
<div id="creator">
    <h1>오늘의 단어</h1>
    <p class="subtitle">친구에게 단어 도전장 보내기</p>
    <div class="card">
        <div class="input-group">
            <label>단어 입력</label>
            <input type="text" id="word-input" placeholder="한글 단어 입력" oninput="onWordInput()" />
            <div class="jamo-hint" id="jamo-hint"></div>
        </div>
        <button class="primary" id="gen-btn" onclick="generateLink()" disabled>링크 생성</button>
    </div>
    <div class="card hidden" id="link-box">
        <label>공유 링크</label>
        <div class="link-display" id="link-text"></div>
        <button class="copy" onclick="copyLink()">링크 복사</button>
    </div>
</div>

<div id="toast">링크가 복사되었습니다</div>
<script src="korean_utils.js"></script>
<script>
(function() {
const _KEY = 42;
let _dictSet = null;
fetch('dict.json?v=2')
    .then(r => r.json())
    .then(data => { _dictSet = new Set(data); onWordInput(); });
const _CHO  = ['ㄱ','ㄱㄱ','ㄴ','ㄷ','ㄷㄷ','ㄹ','ㅁ','ㅂ','ㅂㅂ','ㅅ','ㅅㅅ','ㅇ','ㅈ','ㅈㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const _JUNG = ['ㅏ','ㅏㅣ','ㅑ','ㅑㅣ','ㅓ','ㅓㅣ','ㅕ','ㅕㅣ','ㅗ','ㅗㅏ','ㅗㅏㅣ','ㅗㅣ','ㅛ','ㅜ','ㅜㅓ','ㅜㅓㅣ','ㅜㅣ','ㅠ','ㅡ','ㅡㅣ','ㅣ'];
const _JONG = ['','ㄱ','ㄱㄱ','ㄱㅅ','ㄴ','ㄴㅈ','ㄴㅎ','ㄷ','ㄹ','ㄹㄱ','ㄹㅁ','ㄹㅂ','ㄹㅅ','ㄹㅌ','ㄹㅍ','ㄹㅎ','ㅁ','ㅂ','ㅂㅅ','ㅅ','ㅅㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

window.countJamo = function(text) {
    let n = 0;
    for (const ch of text) {
        const code = ch.codePointAt(0);
        if (code >= 0xAC00 && code <= 0xD7A3) {
            const off = code - 0xAC00;
            n += _CHO[Math.floor(off / (21 * 28))].length;
            n += _JUNG[Math.floor((off % (21 * 28)) / 28)].length;
            n += _JONG[off % 28].length;
        } else { n += 1; }
    }
    return n;
};

window.encodeWord = function(word) {
    const bytes = new TextEncoder().encode(word);
    const xored = bytes.map(b => b ^ _KEY);
    return btoa(String.fromCharCode(...xored))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
};

window.onWordInput = function() {
    const word = document.getElementById('word-input').value.trim();
    const hint = document.getElementById('jamo-hint');
    const btn  = document.getElementById('gen-btn');
    if (!word) { hint.textContent = ''; btn.disabled = true; return; }
    const isKoreanOnly = [...word].every(ch => {
        const code = ch.codePointAt(0);
        return code >= 0xAC00 && code <= 0xD7A3;
    });
    if (!isKoreanOnly) {
        hint.textContent = '한글 단어만 입력하세요';
        hint.className = 'jamo-hint err';
        btn.disabled = true;
        return;
    }
    const n = countJamo(word);
    if (n !== 5) {
        hint.textContent = `자모 ${n}개`;
        hint.className = 'jamo-hint err';
        btn.disabled = true;
        return;
    }
    if (!_dictSet) {
        hint.textContent = '사전 로딩 중...';
        hint.className = 'jamo-hint';
        btn.disabled = true;
        return;
    }
    if (!_dictSet.has(word)) {
        hint.textContent = '사전에 없는 단어입니다';
        hint.className = 'jamo-hint err';
        btn.disabled = true;
        return;
    }
    hint.textContent = `자모 ${n}개`;
    hint.className = 'jamo-hint ok';
    btn.disabled = false;
};

window.generateLink = function() {
    const word = document.getElementById('word-input').value.trim();
    const isKoreanOnly = [...word].every(ch => { const c = ch.codePointAt(0); return c >= 0xAC00 && c <= 0xD7A3; });
    if (!isKoreanOnly || countJamo(word) !== 5) return;
    if (!_dictSet || !_dictSet.has(word)) return;
    const encoded = encodeWord(word);
    const url = new URL('play.html', location.href).href + '?w=' + encoded;
    document.getElementById('link-text').textContent = url;
    document.getElementById('link-box').classList.remove('hidden');
    navigator.clipboard.writeText(url).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    });
};

window.copyLink = function() {
    const url = document.getElementById('link-text').textContent;
    navigator.clipboard.writeText(url).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    });
};
}());
</script>
</body>
</html>
