name: 시간별 단어 자동 갱신

on:
  workflow_dispatch:        # cron-job.org 에서 매시 정각 트리거

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: 랜덤 단어 선택 및 word.json 갱신
        run: |
          python3 - <<'PYEOF'
          import json, random, datetime

          with open('dict.json', encoding='utf-8') as f:
              words = json.load(f)

          with open('word.json', encoding='utf-8') as f:
              current = json.load(f)

          current_word = current.get('word', '')
          candidates = [w for w in words if w != current_word]
          new_word = random.choice(candidates)

          kst = datetime.timezone(datetime.timedelta(hours=9))
          now_kst = datetime.datetime.now(kst)
          updated = now_kst.strftime('%Y-%m-%d %H:%M')
          today_date = now_kst.strftime('%Y-%m-%d')
          current_hour = now_kst.hour

          today_words = {}
          if current.get('today_date') == today_date:
              today_words = current.get('today_words', {})
          today_words[str(current_hour)] = new_word

          with open('word.json', 'w', encoding='utf-8') as f:
              json.dump({'word': new_word, 'last': current_word, 'updated': updated,
                         'today_date': today_date, 'today_words': today_words,
                         'share_total': current.get('share_total', 0),
                         'share_today': current.get('share_today', {'date': '', 'count': 0})},
                        f, ensure_ascii=False, indent=2)
              f.write('\n')

          print(f'{current_word} → {new_word}  (hour {current_hour}, {updated} KST)')
          PYEOF

      - name: 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add word.json
          git diff --cached --quiet || git commit -m "단어 자동 갱신 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')"
          git push
